<!-- admin_restock_candidates.html — 재입고 후보 리스트 (관리자 전용) -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재입고 후보 (관리자)</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        .content { max-width: 1150px; margin: 0 auto; padding: 16px; }
        .rc-controls { background: #f3f0f8; border: 1px solid #d8cfe6; border-radius: 6px; padding: 12px 14px; margin: 12px 0; display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end; }
        .rc-controls label { display: flex; flex-direction: column; font-size: 0.85em; color: #555; gap: 3px; }
        .rc-controls input, .rc-controls select { padding: 5px 8px; width: 90px; }
        .rc-controls select { width: 110px; }
        .rc-controls button { padding: 7px 16px; }
        .rc-table { border-collapse: collapse; width: 100%; margin: 10px 0; }
        .rc-table th, .rc-table td { border: 1px solid #ccc; padding: 6px 9px; text-align: right; }
        .rc-table th:nth-child(2), .rc-table td:nth-child(2),
        .rc-table th:first-child, .rc-table td:first-child { text-align: left; }
        .rc-table thead th { background: #3a2b4d; color: #fff; position: sticky; top: 0; }
        .rc-table tbody tr:nth-child(even) { background: #f6f4f9; }
        .urgent { color: #c0392b; font-weight: bold; }
        .warn { color: #e67e22; }
        .muted { color: #888; font-size: 0.85em; }
        #summary { margin: 10px 0; font-size: 1.05em; }
        #status { color: #555; }
        .copybtn { padding: 6px 12px; margin-left: 8px; }
    </style>
</head>
<body>
    <div id="navbar"></div>
    <div class="content">
        <h1>재입고 후보 <span class="muted">· 관리자 전용</span></h1>
        <div id="status">불러오는 중...</div>

        <div class="rc-controls">
            <label>분석 기간(개월)<input type="number" id="period" value="3" min="1" max="12"></label>
            <label>소진 임박 ≤ (개월)<input type="number" id="threshold" value="1.5" min="0.1" step="0.1"></label>
            <label>최소 월판매(개)<input type="number" id="minSales" value="1" min="0" step="0.5"></label>
            <label>목표 재고(개월분)<input type="number" id="target" value="3" min="1" step="0.5"></label>
            <label>분류
                <select id="catFilter">
                    <option value="전체">전체</option>
                    <option value="방꾸미기">방꾸미기</option>
                    <option value="다꾸">다꾸</option>
                </select>
            </label>
            <button id="applyBtn">적용</button>
        </div>

        <div id="summary"></div>
        <div id="result"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="./firebaseConfig.js"></script>
    <script src="./loadManageNavbar.js"></script>
    <script src="./admin_restock_candidates.js?v=7"></script>
</body>
</html>
