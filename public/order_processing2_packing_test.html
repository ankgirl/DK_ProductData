<!-- 포장완료 리팩토링 (collectDemand + computeUpdates) 종합 테스트 -->
<!-- Firebase 불필요. 브라우저에서 바로 열기 가능 -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>포장완료 리팩토링 테스트 (collectDemand + computeUpdates)</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
        h2 { color: #569cd6; }
        h3 { color: #9cdcfe; margin: 24px 0 6px; border-bottom: 1px solid #333; padding-bottom: 4px; }
        .pass   { color: #4ec9b0; }
        .fail   { color: #f44747; }
        .section { margin: 4px 0; padding: 10px 14px; border: 1px solid #333; border-radius: 4px; }
        #summary { font-size: 18px; margin-top: 24px; font-weight: bold; }
        small { color: #f88; }
        .product-card { background: #252526; border: 1px solid #444; padding: 10px; margin: 8px 0; border-radius: 4px; font-size: 12px; }
        .product-card b { color: #ce9178; }
    </style>
</head>
<body>
    <h2>포장완료 리팩토링 종합 테스트</h2>

    <div class="product-card">
        <b>65_9998</b> (옵션 6개, 재고: [0, 3, 3, 3, 3, 3]) |
        바코드: 9998-A ~ 9998-F | 원가: 1500<br>
        <b>SET_65_9998</b> 재고: 7
    </div>
    <div class="product-card">
        <b>65_9999</b> (옵션 6개, 재고: [6, 6, 6, 6, 6, 6]) |
        바코드: 9999-A ~ 9999-F | 원가: 2000<br>
        <b>SET_65_9999</b> 재고: 14
    </div>
    <div class="product-card">
        <b>70_0001</b> (옵션 3개, 재고: [5, 5, 5]) |
        바코드: 7001-A ~ 7001-C | 원가: 1000<br>
        SET 없음
    </div>

    <div id="testResults"></div>
    <div id="summary"></div>

    <!-- 템플릿 (DOM 렌더링용) -->
    <template id="orderTableTemplate">
        <table>
            <thead><tr>
                <th>상품주문번호</th><th>판매자 상품코드</th><th>입고차수</th>
                <th>옵션정보</th><th>수량</th><th>포장수량</th>
                <th>총가격</th><th>원가</th><th>Counts</th>
                <th>바코드</th><th>옵션이미지</th><th>실제이미지</th><th>체크</th>
            </tr></thead>
            <tbody id="orderTableBody"></tbody>
        </table>
    </template>
    <template id="orderRowTemplate">
        <tr>
            <td data-field="상품주문번호"></td>
            <td data-field="판매자상품코드"></td>
            <td data-field="입고차수"></td>
            <td data-field="옵션정보"></td>
            <td data-field="수량"></td>
            <td><input type="number" class="packingQuantity" data-input="packingQuantity" min="0" value="0"></td>
            <td data-field="총가격"></td>
            <td data-field="원가"></td>
            <td data-field="Counts"></td>
            <td data-field="바코드"></td>
            <td class="image-container"><img data-img="옵션이미지URL" alt=""></td>
            <td class="image-container"><img data-img="실제이미지URL" alt=""></td>
            <td><input type="checkbox" class="barcodeCheck" data-input="barcodeCheck"></td>
        </tr>
    </template>

    <script type="module">
    // ════════════════════════════════════════════════════════════════════
    // 테스트 데이터
    // ════════════════════════════════════════════════════════════════════
    const OPTS = ['A','B','C','D','E','F'];

    function make9998() {
        const opt = {};
        OPTS.forEach((k, i) => { opt[`옵션${k}`] = { Counts: i === 0 ? 0 : 3, 바코드: `9998-${k}` }; });
        return { id: '65_9998', SellerCode: '65_9998', 원가: 1500,
                 소분류명: '1차입고', OptionDatas: opt };
    }
    function makeSet9998(counts = 7) {
        return { id: 'SET_65_9998', SellerCode: 'SET_65_9998',
                 OptionDatas: { '옵션1': { Counts: counts } } };
    }
    function make9999() {
        const opt = {};
        OPTS.forEach(k => { opt[`옵션${k}`] = { Counts: 6, 바코드: `9999-${k}` }; });
        return { id: '65_9999', SellerCode: '65_9999', 원가: 2000,
                 소분류명: '1차입고', OptionDatas: opt };
    }
    function makeSet9999(counts = 14) {
        return { id: 'SET_65_9999', SellerCode: 'SET_65_9999',
                 OptionDatas: { '옵션1': { Counts: counts } } };
    }
    function make70_0001() {
        const opt = {};
        ['A','B','C'].forEach(k => { opt[`옵션${k}`] = { Counts: 5, 바코드: `7001-${k}` }; });
        return { id: '70_0001', SellerCode: '70_0001', 원가: 1000,
                 소분류명: '2차입고', OptionDatas: opt };
    }

    // ════════════════════════════════════════════════════════════════════
    // Mock productMap (getProductByBarcode / getProductBySellerCode 대체)
    // ════════════════════════════════════════════════════════════════════
    let mockProductMap = new Map();

    function resetMocks() {
        mockProductMap = new Map();
        mockProductMap.set('65_9998', make9998());
        mockProductMap.set('65_9999', make9999());
        mockProductMap.set('70_0001', make70_0001());
        mockProductMap.set('SET_65_9998', makeSet9998());
        mockProductMap.set('SET_65_9999', makeSet9999());
    }

    async function getProductByBarcode(barcode) {
        for (const [id, data] of mockProductMap.entries()) {
            if (data.OptionDatas) {
                for (const opt in data.OptionDatas) {
                    if (data.OptionDatas[opt].바코드 === barcode) {
                        return { id, ...data, matchedOption: opt };
                    }
                }
            }
        }
        return null;
    }

    async function getProductBySellerCode(sellerCode) {
        return mockProductMap.get(sellerCode) || null;
    }

    // Mock Firebase db (SET 조회용)
    function makeMockDb() {
        return {
            collection: (name) => ({
                doc: (id) => ({
                    get: async () => {
                        const data = mockProductMap.get(id);
                        return {
                            exists: !!data,
                            data: () => data ? JSON.parse(JSON.stringify(data)) : null,
                        };
                    }
                })
            })
        };
    }

    // ════════════════════════════════════════════════════════════════════
    // collectDemand (display.js 로직 인라인 복사)
    // ════════════════════════════════════════════════════════════════════
    function collectDemand(orderDetailsDiv, orderData) {
        const barcodeDemand = {};
        const setDemand = {};

        for (const row of orderDetailsDiv.querySelectorAll('tbody tr')) {
            const sellerCode = row.querySelector('[data-field="판매자상품코드"]')?.textContent || '';
            const packingInput = row.querySelector('.packingQuantity');
            if (!packingInput || packingInput.value === '') continue;
            const qty = parseInt(packingInput.value, 10);

            if (sellerCode.startsWith('SET_')) {
                // SET 상품은 6개 옵션 행으로 펼쳐지지만 실제로는 1개 주문
                if (!setDemand[sellerCode]) {
                    setDemand[sellerCode] = qty;
                }
            } else {
                const barcode = row.querySelector('[data-field="바코드"]')?.textContent;
                if (barcode) barcodeDemand[barcode] = (barcodeDemand[barcode] || 0) + qty;
            }
        }

        for (const service of (orderData.ProductService || [])) {
            if (service.바코드) {
                barcodeDemand[service.바코드] = (barcodeDemand[service.바코드] || 0) + 1;
            }
        }

        return { barcodeDemand, setDemand };
    }

    // ════════════════════════════════════════════════════════════════════
    // computeUpdates (display.js 로직 인라인 복사)
    // ════════════════════════════════════════════════════════════════════
    async function computeUpdates(barcodeDemand, setDemand, db) {
        const productGroups = {};
        const setProductIds = new Set(Object.keys(setDemand));

        for (const [barcode, qty] of Object.entries(barcodeDemand)) {
            const product = await getProductByBarcode(barcode);
            if (!product) continue;

            let optionKey;
            for (const k in product.OptionDatas) {
                if (product.OptionDatas[k].바코드 === barcode) { optionKey = k; break; }
            }

            if (!productGroups[product.id]) {
                productGroups[product.id] = { product, options: {} };
                const setProduct = await getProductBySellerCode('SET_' + product.id);
                if (setProduct) setProductIds.add(setProduct.id);
            }
            productGroups[product.id].options[optionKey] =
                (productGroups[product.id].options[optionKey] || 0) + qty;
        }

        const setCountsMap = {};
        for (const setId of setProductIds) {
            const doc = await db.collection('Products').doc(setId).get();
            if (doc.exists) {
                setCountsMap[setId] = doc.data().OptionDatas?.['옵션1']?.Counts || 0;
            }
        }

        const productUpdatesMap = {};
        const setResults = {};

        for (const [setId, qty] of Object.entries(setDemand)) {
            if (setCountsMap[setId] !== undefined) {
                setCountsMap[setId] -= qty;
            }
        }

        for (const [productId, group] of Object.entries(productGroups)) {
            const clonedOptions = {};
            for (const k in group.product.OptionDatas) {
                clonedOptions[k] = { ...group.product.OptionDatas[k] };
            }

            for (const [optKey, qty] of Object.entries(group.options)) {
                if (clonedOptions[optKey]) {
                    clonedOptions[optKey].Counts = (clonedOptions[optKey].Counts || 0) - qty;
                }
            }

            const setId = 'SET_' + productId;
            const setAvailable = setCountsMap[setId] ?? 0;

            if (setAvailable > 0) {
                let setsNeeded = 0;
                for (const optKey in clonedOptions) {
                    const deficit = -(clonedOptions[optKey].Counts ?? 0);
                    if (deficit > setsNeeded) setsNeeded = deficit;
                }
                setsNeeded = Math.min(setsNeeded, setAvailable);

                if (setsNeeded > 0) {
                    for (const optKey in clonedOptions) {
                        clonedOptions[optKey].Counts += setsNeeded;
                    }
                    setCountsMap[setId] -= setsNeeded;
                }
            }

            for (const optKey in clonedOptions) {
                if (clonedOptions[optKey].Counts < 0) clonedOptions[optKey].Counts = 0;
            }

            productUpdatesMap[productId] = {
                id: productId,
                data: { ...group.product, OptionDatas: clonedOptions },
            };
        }

        for (const [setId, counts] of Object.entries(setCountsMap)) {
            setResults[setId] = { UpdatedCounts: counts };
        }

        return { productUpdatesMap, setResults, setCountsMap };
    }

    // ════════════════════════════════════════════════════════════════════
    // DOM 헬퍼
    // ════════════════════════════════════════════════════════════════════
    function fillField(node, name, val) {
        const el = node.querySelector(`[data-field="${name}"]`);
        if (el) el.textContent = val ?? '';
    }

    function renderRows(container, rows) {
        const tableNode = document.getElementById('orderTableTemplate').content.cloneNode(true);
        const tbody = tableNode.querySelector('#orderTableBody');
        rows.forEach(r => {
            const rowNode = document.getElementById('orderRowTemplate').content.cloneNode(true);
            fillField(rowNode, '판매자상품코드', r.sellerCode);
            fillField(rowNode, '바코드', r.barcode);
            fillField(rowNode, '수량', r.qty);
            const pInput = rowNode.querySelector('.packingQuantity');
            if (pInput) pInput.value = r.packingQty ?? '0';
            tbody.appendChild(rowNode);
        });
        container.appendChild(tableNode);
    }

    function mkContainer() {
        const d = document.createElement('div');
        d.style.display = 'none';
        document.body.appendChild(d);
        return d;
    }

    // ════════════════════════════════════════════════════════════════════
    // 테스트 프레임워크
    // ════════════════════════════════════════════════════════════════════
    const results = [];
    async function test(name, fn) {
        try { await fn(); results.push({ name, pass: true }); }
        catch (e) { results.push({ name, pass: false, error: e.message }); }
    }
    function assert(cond, msg) { if (!cond) throw new Error(msg || 'assertion failed'); }
    function assertEq(a, b, msg) {
        if (a !== b) throw new Error(msg || `expected ${JSON.stringify(b)}, got ${JSON.stringify(a)}`);
    }

    // ════════════════════════════════════════════════════════════════════
    // G1: collectDemand - DOM 수량 집계
    // ════════════════════════════════════════════════════════════════════
    await test('G1-T1: 단일 상품 1개 → barcodeDemand에 수량 1', () => {
        const c = mkContainer();
        renderRows(c, [{ sellerCode: '65_9999', barcode: '9999-A', qty: 1, packingQty: '1' }]);
        const { barcodeDemand, setDemand } = collectDemand(c, {});
        assertEq(barcodeDemand['9999-A'], 1);
        assertEq(Object.keys(setDemand).length, 0);
    });

    await test('G1-T2: 같은 바코드 2행 (수량 1+2) → 합산 3', () => {
        const c = mkContainer();
        renderRows(c, [
            { sellerCode: '65_9999', barcode: '9999-A', qty: 1, packingQty: '1' },
            { sellerCode: '65_9999', barcode: '9999-A', qty: 2, packingQty: '2' },
        ]);
        const { barcodeDemand } = collectDemand(c, {});
        assertEq(barcodeDemand['9999-A'], 3);
    });

    await test('G1-T3: SET 상품 → setDemand에 기록, barcodeDemand에 안 감', () => {
        const c = mkContainer();
        renderRows(c, [
            { sellerCode: 'SET_65_9998', barcode: '', qty: 1, packingQty: '1' },
            { sellerCode: '65_9999', barcode: '9999-B', qty: 1, packingQty: '1' },
        ]);
        const { barcodeDemand, setDemand } = collectDemand(c, {});
        assertEq(setDemand['SET_65_9998'], 1);
        assert(!barcodeDemand[''], 'SET 바코드가 barcodeDemand에 들어감');
        assertEq(barcodeDemand['9999-B'], 1);
    });

    await test('G1-T4: 서비스 제품 → barcodeDemand에 합산', () => {
        const c = mkContainer();
        renderRows(c, [{ sellerCode: '65_9999', barcode: '9999-A', qty: 1, packingQty: '1' }]);
        const orderData = { ProductService: [{ 바코드: '9999-A' }, { 바코드: '9998-B' }] };
        const { barcodeDemand } = collectDemand(c, orderData);
        assertEq(barcodeDemand['9999-A'], 2, '원주문1 + 서비스1 = 2');
        assertEq(barcodeDemand['9998-B'], 1);
    });

    await test('G1-T5: 빈 주문 → 빈 결과', () => {
        const c = mkContainer();
        const { barcodeDemand, setDemand } = collectDemand(c, {});
        assertEq(Object.keys(barcodeDemand).length, 0);
        assertEq(Object.keys(setDemand).length, 0);
    });

    await test('G1-T6: 포장수량 0인 행 무시', () => {
        const c = mkContainer();
        renderRows(c, [
            { sellerCode: '65_9999', barcode: '9999-A', qty: 1, packingQty: '0' },
            { sellerCode: '65_9999', barcode: '9999-B', qty: 1, packingQty: '1' },
        ]);
        const { barcodeDemand } = collectDemand(c, {});
        assert(!barcodeDemand['9999-A'], '포장수량 0인데 집계됨');
        assertEq(barcodeDemand['9999-B'], 1);
    });

    await test('G1-T7: 65_9998 6옵션 + SET + 서비스 2개 — 복합 집계', () => {
        const c = mkContainer();
        const rows = OPTS.map(k => ({
            sellerCode: '65_9998', barcode: `9998-${k}`, qty: 1, packingQty: '1'
        }));
        rows.push({ sellerCode: 'SET_65_9998', barcode: '', qty: 1, packingQty: '1' });
        renderRows(c, rows);
        const orderData = { ProductService: [{ 바코드: '9998-A' }, { 바코드: '9998-C' }] };
        const { barcodeDemand, setDemand } = collectDemand(c, orderData);
        assertEq(barcodeDemand['9998-A'], 2, '원주문1 + 서비스1');
        assertEq(barcodeDemand['9998-C'], 2, '원주문1 + 서비스1');
        assertEq(barcodeDemand['9998-B'], 1);
        assertEq(setDemand['SET_65_9998'], 1);
    });

    await test('G1-T8: SET 6행 펼쳐짐 → 첫 행만 집계, 합산 안됨', () => {
        const c = mkContainer();
        // SET 상품은 6개 옵션 행으로 펼쳐짐 (실제 주문처리 화면과 동일)
        renderRows(c, [
            { sellerCode: 'SET_65_9998', barcode: '9998-A', qty: 1, packingQty: '1' },
            { sellerCode: 'SET_65_9998', barcode: '9998-B', qty: 1, packingQty: '1' },
            { sellerCode: 'SET_65_9998', barcode: '9998-C', qty: 1, packingQty: '1' },
            { sellerCode: 'SET_65_9998', barcode: '9998-D', qty: 1, packingQty: '1' },
            { sellerCode: 'SET_65_9998', barcode: '9998-E', qty: 1, packingQty: '1' },
            { sellerCode: 'SET_65_9998', barcode: '9998-F', qty: 1, packingQty: '1' },
        ]);
        const { setDemand } = collectDemand(c, {});
        assertEq(setDemand['SET_65_9998'], 1, `SET이 6으로 합산됨: ${setDemand['SET_65_9998']}`);
    });

    await test('G1-T9: ORDER-D 시나리오 — SET 6행 + 개별1행 + 서비스5개', () => {
        const c = mkContainer();
        renderRows(c, [
            { sellerCode: '65_9998', barcode: '9998-A', qty: 1, packingQty: '1' },
            { sellerCode: 'SET_65_9998', barcode: '9998-A', qty: 1, packingQty: '1' },
            { sellerCode: 'SET_65_9998', barcode: '9998-B', qty: 1, packingQty: '1' },
            { sellerCode: 'SET_65_9998', barcode: '9998-C', qty: 1, packingQty: '1' },
            { sellerCode: 'SET_65_9998', barcode: '9998-D', qty: 1, packingQty: '1' },
            { sellerCode: 'SET_65_9998', barcode: '9998-E', qty: 1, packingQty: '1' },
            { sellerCode: 'SET_65_9998', barcode: '9998-F', qty: 1, packingQty: '1' },
        ]);
        const orderData = { ProductService: [
            { 바코드: '9998-B' }, { 바코드: '9998-B' }, { 바코드: '9998-B' },
            { 바코드: '9998-B' }, { 바코드: '9998-B' },
        ]};
        const { barcodeDemand, setDemand } = collectDemand(c, orderData);
        assertEq(setDemand['SET_65_9998'], 1, 'SET은 1이어야 함');
        assertEq(barcodeDemand['9998-A'], 1, '개별 그린라이트 1');
        assertEq(barcodeDemand['9998-B'], 5, '서비스 캔디병 5');
    });

    await test('G1-T10: ORDER-D 전체 계산 — [0,4,4,4,4,4] SET=7 → [0,0,5,5,5,5] SET=5', async () => {
        resetMocks();
        // 초기 상태: [0,4,4,4,4,4] SET=7
        const p = mockProductMap.get('65_9998');
        p.OptionDatas['옵션A'].Counts = 0;
        OPTS.slice(1).forEach(k => { p.OptionDatas[`옵션${k}`].Counts = 4; });

        const c = mkContainer();
        renderRows(c, [
            { sellerCode: '65_9998', barcode: '9998-A', qty: 1, packingQty: '1' },
            { sellerCode: 'SET_65_9998', barcode: '9998-A', qty: 1, packingQty: '1' },
            { sellerCode: 'SET_65_9998', barcode: '9998-B', qty: 1, packingQty: '1' },
            { sellerCode: 'SET_65_9998', barcode: '9998-C', qty: 1, packingQty: '1' },
            { sellerCode: 'SET_65_9998', barcode: '9998-D', qty: 1, packingQty: '1' },
            { sellerCode: 'SET_65_9998', barcode: '9998-E', qty: 1, packingQty: '1' },
            { sellerCode: 'SET_65_9998', barcode: '9998-F', qty: 1, packingQty: '1' },
        ]);
        const orderData = { ProductService: [
            { 바코드: '9998-B' }, { 바코드: '9998-B' }, { 바코드: '9998-B' },
            { 바코드: '9998-B' }, { 바코드: '9998-B' },
        ]};
        const { barcodeDemand, setDemand } = collectDemand(c, orderData);
        const db = makeMockDb();
        const { productUpdatesMap, setCountsMap } = await computeUpdates(barcodeDemand, setDemand, db);
        const opts = productUpdatesMap['65_9998'].data.OptionDatas;

        assertEq(opts['옵션A'].Counts, 0, `옵션A: ${opts['옵션A'].Counts}`);
        assertEq(opts['옵션B'].Counts, 0, `옵션B(캔디병): ${opts['옵션B'].Counts}`);
        assertEq(opts['옵션C'].Counts, 5, `옵션C: ${opts['옵션C'].Counts}`);

        assertEq(setCountsMap['SET_65_9998'], 0);
    });

    // ════════════════════════════════════════════════════════════════════
    // 결과 렌더링
    // ════════════════════════════════════════════════════════════════════
    const OUTPUT = document.getElementById('testResults');
    const groupNames = {
        G1: 'collectDemand — DOM + 서비스 수량 집계',
        G2: 'computeUpdates — 일반 차감 (SET 보정 없음)',
        G3: 'computeUpdates — SET 보정',
        G4: 'computeUpdates — productMap 오염 방지',
        G5: 'computeUpdates — setResults (generateBatchContent 호환)',
        G6: '통합 시나리오 (collectDemand → computeUpdates)',
        G7: '엣지 케이스',
    };
    const groups = {};
    results.forEach(r => {
        const g = r.name.split('-')[0];
        if (!groups[g]) groups[g] = [];
        groups[g].push(r);
    });
    Object.entries(groups).forEach(([key, tests]) => {
        const h = document.createElement('h3');
        h.textContent = `${key}: ${groupNames[key] || key}`;
        OUTPUT.appendChild(h);
        tests.forEach(r => {
            const div = document.createElement('div');
            div.className = 'section';
            div.innerHTML = r.pass
                ? `<span class="pass">PASS</span> — ${r.name}`
                : `<span class="fail">FAIL</span> — ${r.name}<br><small>${r.error}</small>`;
            OUTPUT.appendChild(div);
        });
    });
    const passCount = results.filter(r => r.pass).length;
    const summary   = document.getElementById('summary');
    summary.className  = passCount === results.length ? 'pass' : 'fail';
    summary.textContent = `결과: ${passCount} / ${results.length} 통과`;
    </script>
</body>
</html>
