<!-- admin_restock_plan.html — 품절 보정 재입고 계획 (관리자 전용) -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재입고 계획 (품절보정, 관리자)</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        .content { max-width: 1250px; margin: 0 auto; padding: 16px; }
        .rp-controls { background: #f3f0f8; border: 1px solid #d8cfe6; border-radius: 6px; padding: 12px 14px; margin: 12px 0; display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end; }
        .rp-controls label { display: flex; flex-direction: column; font-size: 0.85em; color: #555; gap: 3px; }
        .rp-controls input, .rp-controls select { padding: 5px 8px; }
        .rp-controls input[type=number] { width: 80px; }
        .rp-controls button { padding: 7px 16px; }
        .rp-controls label.chk { flex-direction: row; align-items: center; gap: 5px; font-size: 0.9em; color: #333; }
        .rp-note { background:#fff8e1; border:1px solid #ffe082; border-radius:6px; padding:8px 12px; margin:8px 0; font-size:0.85em; color:#7a5a00; }
        .cat-cards { display:flex; flex-wrap:wrap; gap:14px; margin:14px 0; }
        .cat-card { flex:1 1 320px; border:1px solid #d8cfe6; border-radius:8px; padding:14px 16px; background:#fff; }
        .cat-card h2 { margin:0 0 8px; font-size:1.15em; }
        .cat-card.room { border-top:4px solid #8884d8; }
        .cat-card.daku { border-top:4px solid #e69138; }
        .cat-card .amt-label { font-size:0.82em; color:#666; margin-bottom:2px; }
        .cat-card .amt { font-size:1.7em; font-weight:bold; color:#2e7d32; line-height:1.1; }
        .cat-card .line { display:flex; justify-content:space-between; font-size:0.9em; color:#444; margin:3px 0; }
        .cat-card .line.muted2 { color:#888; font-size:0.84em; }
        .cat-card .uplift { color:#c0392b; font-weight:bold; }
        .cat-card .cc-hr { border:none; border-top:1px dashed #ddd; margin:8px 0 4px; }
        .rp-table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size:0.9em; }
        .rp-table th, .rp-table td { border: 1px solid #ccc; padding: 5px 8px; text-align: right; }
        .rp-table th:first-child, .rp-table td:first-child,
        .rp-table th:nth-child(3), .rp-table td:nth-child(3) { text-align: left; }
        .rp-table thead th { background: #3a2b4d; color: #fff; position: sticky; top: 0; cursor:pointer; user-select:none; }
        .rp-table tbody tr:nth-child(even) { background: #f6f4f9; }
        .rp-table tbody tr.sufficient td { background: #f0f0f0; color: #9a9a9a; }
        .rp-table tbody tr.paused td { background: #fdecec; color: #b05a5a; }
        .rp-table tbody tr.paused.sufficient td { background: #f7e3e3; }
        .tag.suff { background:#e8eef5; color:#3a6ea5; }
        .tag { display:inline-block; font-size:0.78em; padding:1px 6px; border-radius:8px; }
        .tag.exact { background:#e0f2e9; color:#1b7a44; }
        .tag.est { background:#fdeeda; color:#a5610a; }
        .tag.warn { background:#fdeaea; color:#c0392b; }
        .up { color:#c0392b; font-weight:bold; }
        .shoplink { text-decoration:none; font-size:0.9em; margin-left:2px; }
        .exbtn { padding:2px 6px; cursor:pointer; border:1px solid #e0b4b4; background:#fff; border-radius:4px; }
        .exbtn:hover { background:#fdeaea; }
        #pausePanel { margin:8px 0; }
        #pausePanel summary { cursor:pointer; }
        .pause-list { display:flex; flex-wrap:wrap; gap:6px; margin:8px 0; }
        .pause-chip { display:inline-flex; align-items:center; gap:6px; background:#f3f0f8; border:1px solid #d8cfe6; border-radius:12px; padding:2px 10px; font-size:0.85em; }
        .pause-chip .restore { color:#1b7a44; text-decoration:none; font-size:0.9em; }
        .pause-chip .restore:hover { text-decoration:underline; }
        .muted { color: #888; font-size: 0.85em; }
        #summary { margin: 10px 0; font-size: 1.02em; }
        #status { color: #555; }
        .copybtn { padding: 6px 12px; margin-left: 8px; }
    </style>
</head>
<body>
    <div id="navbar"></div>
    <div class="content">
        <h1>재입고 계획 <span class="muted">· 품절보정 · 관리자 전용</span></h1>
        <div id="status">불러오는 중...</div>

        <div class="rp-controls">
            <label>분석 시작일<input type="date" id="analysisStart"></label>
            <label>분석 끝일<input type="date" id="analysisEnd"></label>
            <label>발주 커버(주)<input type="number" id="coverWeeks" value="2" min="0.5" step="0.5"></label>
            <label>안전계수<input type="number" id="safety" value="1.3" min="1" step="0.05"></label>
            <label>업리프트 상한(배)<input type="number" id="cap" value="3" min="1" step="0.5"></label>
            <label>신상 여유(%)<input type="number" id="newPct" value="0" min="0" step="5"></label>
            <button id="applyBtn">계산</button>
            <label class="chk"><input type="checkbox" id="showAll"> 재고여유 많은 품목 숨기기</label>
        </div>

        <div id="periodInfo" class="muted"></div>
        <div id="warnBox"></div>

        <div id="catCards" class="cat-cards"></div>

        <div id="pausePanel"></div>

        <div id="summary"></div>
        <div id="result"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="./firebaseConfig.js"></script>
    <script src="./loadManageNavbar.js"></script>
    <script src="./imageFallback.js"></script>
    <script src="./admin_restock_plan.js?v=14"></script>
</body>
</html>
