<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바코드로 판매중지</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="navbar"></div>
    <div class="content">
        <h1>바코드로 판매중지</h1>
        <form id="searchForm">
            <label for="barcode">Barcode:</label>
            <input type="text" id="barcode" name="barcode" required>
            <button type="submit">Search</button>
        </form>
        <br>
        <div id="disableArea" style="display: none;">
            <button id="disableBtn" type="button" style="width: 300px; height: 50px; font-size: 1.2em; background-color: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer;">
                판매중지 (모든 옵션 재고 0 + 판매중지)
            </button>
        </div>
        <br>
        <div id="result"></div>
        <div id="message"></div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="./firebaseConfig.js"></script>
    <script src="./loadNavbar.js"></script>
    <script src="displayProductData.js"></script>
    <script src="aSaveInventoryToSmartStore.js"></script>
    <script type="module" src="./disable_by_barcode.js"></script>
</body>
</html>
